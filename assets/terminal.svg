<svg width="100%" viewBox="0 0 1000 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03170a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <pattern id="scanlines" width="8" height="4" patternUnits="userSpaceOnUse">
      <rect width="8" height="1" fill="#000000" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- bezel + single screen for the whole session -->
  <rect x="0" y="0" width="1000" height="840" rx="18" fill="#0a0c0a"/>
  <rect x="6" y="6" width="988" height="828" rx="13" fill="url(#screenGrad)" stroke="#00FF41" stroke-width="1.4" opacity="0.95"/>

  <!-- one title bar for the entire session -->
  <rect x="6" y="6" width="988" height="30" rx="13" fill="#081208"/>
  <rect x="6" y="24" width="988" height="12" fill="#081208"/>
  <circle cx="28" cy="21" r="6" fill="#FF5F56"/>
  <circle cx="48" cy="21" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="21" r="6" fill="#27C93F"/>
  <text x="500" y="26" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#3f7a4a">guest@ADITYA-JHA:~$ session.log</text>

  <!-- ============ BOOT LOG ============ -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="13">
    <text x="30" y="62" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Initializing kernel modules ..................... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="81" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Mounting /dev/curiosity .......................... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="100" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Compiling ambition.cpp — 0 errors, 0 warnings ..... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="119" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Starting service: full-stack.engine ............... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="138" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Loading personality.json .......................... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.55s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="157" opacity="0">
      <tspan fill="#FFB000">[AUTH]</tspan><tspan fill="#ffd280"> user 'ADITYA_JHA' verified — access granted</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.2s" fill="freeze"/>
    </text>
  </g>

  <!-- name reveal -->
  <text x="30" y="220" font-family="Consolas, 'Courier New', monospace" font-size="40" font-weight="bold" fill="#00FF41" filter="url(#glow)" opacity="0">
    &gt; ADITYA_JHA
    <animate attributeName="opacity" from="0" to="1" begin="2.35s" dur="0.35s" fill="freeze"/>
  </text>

  <!-- typewriter subtitle -->
  <clipPath id="typeClip">
    <rect x="28" y="238" width="0" height="24">
      <animate attributeName="width" from="0" to="660" begin="2.75s" dur="2.5s" fill="freeze" calcMode="linear"/>
    </rect>
  </clipPath>
  <text x="30" y="256" font-family="Consolas, 'Courier New', monospace" font-size="15" fill="#c8ffd9" clip-path="url(#typeClip)" textLength="655" lengthAdjust="spacingAndGlyphs">
    Full-Stack Developer // MERN // Golang // building things that shouldn't exist yet
  </text>
  <rect x="688" y="242" width="9" height="17" fill="#00FF41" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0;1" keyTimes="0;0.01;0.5;0.51;0.99;1" dur="1s" begin="5.25s" repeatCount="indefinite"/>
  </rect>

  <!-- ============ $ whoami ============ -->
  <text x="30" y="298" font-family="Consolas, 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#3f7a4a">guest@ADITYA-JHA</tspan><tspan fill="#7ee89a">:~$ </tspan><tspan fill="#ffffff">whoami</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="5.3s" dur="0.3s" fill="freeze"/>
  </text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="13" opacity="0">
    <text x="30" y="322"><tspan fill="#33FF66">+ </tspan><tspan fill="#c8ffd9">Full-Stack Developer (MERN) turning 2 AM ideas into real products.</tspan></text>
    <text x="30" y="342"><tspan fill="#33FF66">+ </tspan><tspan fill="#c8ffd9">Loves thinking of new ideas and turning them into reality through code.</tspan></text>
    <text x="30" y="362"><tspan fill="#33FF66">+ </tspan><tspan fill="#c8ffd9">Staying at the forefront of AI integration, modern frameworks, and software design patterns to build resilient softwares.</tspan></text>
    <text x="30" y="382"><tspan fill="#33FF66">+ </tspan><tspan fill="#c8ffd9">Perpetually mid-refactor. Send a PR, not sympathy.</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="5.6s" dur="0.35s" fill="freeze"/>
  </g>

  <!-- ============ $ neofetch ============ -->
  <text x="30" y="428" font-family="Consolas, 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#3f7a4a">guest@ADITYA-JHA</tspan><tspan fill="#7ee89a">:~$ </tspan><tspan fill="#ffffff">neofetch</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="6.1s" dur="0.3s" fill="freeze"/>
  </text>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="6.4s" dur="0.4s" fill="freeze"/>

    <rect x="30" y="450" width="150" height="150" rx="10" fill="#020a03" stroke="#1f6e33" stroke-width="1.5"/>
    <path d="M30 468 L30 450 L48 450" fill="none" stroke="#00FF41" stroke-width="2"/>
    <path d="M162 450 L180 450 L180 468" fill="none" stroke="#00FF41" stroke-width="2"/>
    <path d="M30 582 L30 600 L48 600" fill="none" stroke="#00FF41" stroke-width="2"/>
    <path d="M180 582 L180 600 L162 600" fill="none" stroke="#00FF41" stroke-width="2"/>
    <text x="105" y="540" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="66" font-weight="bold" fill="#00FF41" filter="url(#glow2)">AJ</text>

    <g font-family="Consolas, 'Courier New', monospace" font-size="13">
      <text x="220" y="466"><tspan fill="#00FF41" font-weight="bold">OS</tspan><tspan fill="#4d804d">:      </tspan><tspan fill="#c8ffd9">AdityaOS [Full-Stack Edition]</tspan></text>
      <text x="220" y="486"><tspan fill="#00FF41" font-weight="bold">Host</tspan><tspan fill="#4d804d">:    </tspan><tspan fill="#c8ffd9">github.com/adityajha-coder</tspan></text>
      <text x="220" y="506"><tspan fill="#00FF41" font-weight="bold">Kernel</tspan><tspan fill="#4d804d">:  </tspan><tspan fill="#c8ffd9">React · Node · Express</tspan></text>
      <text x="220" y="526"><tspan fill="#00FF41" font-weight="bold">Shell</tspan><tspan fill="#4d804d">:   </tspan><tspan fill="#c8ffd9">JavaScript ⨯ TypeScript ⨯ Golang</tspan></text>
      <text x="220" y="546"><tspan fill="#00FF41" font-weight="bold">DE</tspan><tspan fill="#4d804d">:      </tspan><tspan fill="#c8ffd9">MERN Stack</tspan></text>
      <text x="220" y="566"><tspan fill="#00FF41" font-weight="bold">CPU</tspan><tspan fill="#4d804d">:     </tspan><tspan fill="#c8ffd9">Problem-Solving Core (100% util)</tspan></text>
      <text x="220" y="586"><tspan fill="#00FF41" font-weight="bold">Memory</tspan><tspan fill="#4d804d">:  </tspan><tspan fill="#c8ffd9">∞ browser tabs, mostly Stack Overflow</tspan></text>
    </g>

    <rect x="220" y="600" width="16" height="16" fill="#003d0f"/>
    <rect x="238" y="600" width="16" height="16" fill="#0a6b1f"/>
    <rect x="256" y="600" width="16" height="16" fill="#1f9e3a"/>
    <rect x="274" y="600" width="16" height="16" fill="#33ff66"/>
    <rect x="292" y="600" width="16" height="16" fill="#7ee89a"/>
    <rect x="310" y="600" width="16" height="16" fill="#00ff41"/>
    <rect x="328" y="600" width="16" height="16" fill="#c8ffd9"/>
    <rect x="346" y="600" width="16" height="16" fill="#ffffff"/>
  </g>

  <!-- ============ $ ls tech-stack tree ============ -->
  <text x="30" y="656" font-family="Consolas, 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#3f7a4a">guest@ADITYA-JHA</tspan><tspan fill="#7ee89a">:~$ </tspan><tspan fill="#ffffff">ls ~/tech-stack --tree</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="6.9s" dur="0.3s" fill="freeze"/>
  </text>
  <g font-family="Consolas, 'Courier New', monospace" font-size="13" opacity="0">
    <text x="30" y="680" fill="#c8ffd9">~/tech-stack</text>
    <text x="30" y="700"><tspan fill="#33FF66">├── languages/</tspan><tspan fill="#4d804d">   →  </tspan><tspan fill="#c8ffd9">C · C++ · JavaScript · TypeScript · Go · HTML · CSS</tspan></text>
    <text x="30" y="720"><tspan fill="#33FF66">├── frontend/</tspan><tspan fill="#4d804d">    →  </tspan><tspan fill="#c8ffd9">React · Next.js · Tailwind · Three.js · Framer · GSAP</tspan></text>
    <text x="30" y="740"><tspan fill="#33FF66">├── backend/</tspan><tspan fill="#4d804d">     →  </tspan><tspan fill="#c8ffd9">Node.js · Express · MongoDB · MySQL · Firebase · Supabase</tspan></text>
    <text x="30" y="760"><tspan fill="#33FF66">└── tools/</tspan><tspan fill="#4d804d">       →  </tspan><tspan fill="#c8ffd9">Git · GitHub · Postman · Docker · Vercel</tspan></text>
    <animate attributeName="opacity" from="0" to="1" begin="7.2s" dur="0.35s" fill="freeze"/>
  </g>

  <!-- idle cursor once session finishes -->
  <rect x="30" y="778" width="9" height="16" fill="#00FF41" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0;1" keyTimes="0;0.01;0.5;0.51;0.99;1" dur="1s" begin="7.6s" repeatCount="indefinite"/>
  </rect>

  <!-- scanlines + flicker over the whole session -->
  <rect x="6" y="6" width="988" height="828" rx="13" fill="url(#scanlines)"/>
  <rect x="0" y="0" width="1000" height="840" fill="#00FF41" opacity="0">
    <animate attributeName="opacity" values="0;0.02;0;0.015;0;0.025;0" dur="1.3s" repeatCount="indefinite"/>
  </rect>
</svg>