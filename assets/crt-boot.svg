<svg width="100%" viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#03170a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <pattern id="scanlines" width="8" height="4" patternUnits="userSpaceOnUse">
      <rect width="8" height="1" fill="#000000" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- bezel -->
  <rect x="0" y="0" width="1000" height="340" rx="18" fill="#0a0c0a"/>
  <rect x="6" y="6" width="988" height="328" rx="13" fill="url(#screenGrad)" stroke="#00FF41" stroke-width="1.4" opacity="0.95"/>

  <!-- title bar -->
  <rect x="6" y="6" width="988" height="30" rx="13" fill="#081208"/>
  <rect x="6" y="24" width="988" height="12" fill="#081208"/>
  <circle cx="28" cy="21" r="6" fill="#FF5F56"/>
  <circle cx="48" cy="21" r="6" fill="#FFBD2E"/>
  <circle cx="68" cy="21" r="6" fill="#27C93F"/>
  <text x="500" y="26" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#3f7a4a">guest@ADITYA-JHA:~$ ./boot.sh</text>

  <!-- boot log lines, staggered fade-in like a real boot sequence -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="13">
    <text x="30" y="62" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Initializing kernel modules ..................... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="81" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Mounting /dev/curiosity .......................... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="100" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Compiling ambition.cpp — 0 errors, 0 warnings ..... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="119" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Starting service: full-stack.engine ............... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="138" opacity="0">
      <tspan fill="#33FF66">[ OK ]</tspan><tspan fill="#7ee89a"> Loading personality.json .......................... done</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.55s" dur="0.2s" fill="freeze"/>
    </text>
    <text x="30" y="157" opacity="0">
      <tspan fill="#FFB000">[AUTH]</tspan><tspan fill="#ffd280"> user 'ADITYA_JHA' verified — access granted</tspan>
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.2s" fill="freeze"/>
    </text>
  </g>

  <!-- big name reveal -->
  <text x="30" y="222" font-family="Consolas, 'Courier New', monospace" font-size="42" font-weight="bold" fill="#00FF41" filter="url(#glow)" opacity="0">
    &gt; ADITYA_JHA
    <animate attributeName="opacity" from="0" to="1" begin="2.35s" dur="0.35s" fill="freeze"/>
  </text>

  <!-- typewriter subtitle -->
  <clipPath id="typeClip">
    <rect x="28" y="238" width="0" height="26">
      <animate attributeName="width" from="0" to="705" begin="2.75s" dur="2.6s" fill="freeze" calcMode="linear"/>
    </rect>
  </clipPath>
  <text x="30" y="258" font-family="Consolas, 'Courier New', monospace" font-size="16" fill="#c8ffd9" clip-path="url(#typeClip)" textLength="700" lengthAdjust="spacingAndGlyphs">
    Full-Stack Developer // MERN // building things that shouldn't exist yet
  </text>

  <!-- blinking cursor after typing completes -->
  <rect x="736" y="243" width="9" height="17" fill="#00FF41" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0;1" keyTimes="0;0.01;0.5;0.51;0.99;1" dur="1s" begin="5.35s" repeatCount="indefinite"/>
  </rect>

  <!-- footer status line -->
  <text x="30" y="300" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#2f6b3d" opacity="0">
    [ system ] uptime: shipping since 2022 · status: probably debugging something
    <animate attributeName="opacity" from="0" to="1" begin="5.4s" dur="0.6s" fill="freeze"/>
  </text>

  <!-- scanline overlay -->
  <rect x="6" y="6" width="988" height="328" rx="13" fill="url(#scanlines)"/>

  <!-- subtle CRT flicker -->
  <rect x="0" y="0" width="1000" height="340" fill="#00FF41" opacity="0">
    <animate attributeName="opacity" values="0;0.025;0;0.018;0;0.03;0" dur="1.3s" repeatCount="indefinite"/>
  </rect>
</svg>