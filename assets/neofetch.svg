  <text x="230" y="42" font-family="Consolas, 'Courier New', monospace" font-size="17" font-weight="bold" fill="#33FF66">guest@ADITYA-JHA</text>
  <rect x="230" y="50" width="644" height="1.5" fill="#1f6e33"/>

  <!-- fields -->
  <g font-family="Consolas, 'Courier New', monospace" font-size="14">
    <text x="230" y="76"><tspan fill="#00FF41" font-weight="bold">OS</tspan><tspan fill="#4d804d">:      </tspan><tspan fill="#c8ffd9">AdityaOS [Full-Stack Edition]</tspan></text>
    <text x="230" y="99"><tspan fill="#00FF41" font-weight="bold">Host</tspan><tspan fill="#4d804d">:    </tspan><tspan fill="#c8ffd9">github.com/adityajha-coder</tspan></text>
    <text x="230" y="122"><tspan fill="#00FF41" font-weight="bold">Kernel</tspan><tspan fill="#4d804d">:  </tspan><tspan fill="#c8ffd9">React 18 · Node 20 · Express</tspan></text>
    <text x="230" y="145"><tspan fill="#00FF41" font-weight="bold">Shell</tspan><tspan fill="#4d804d">:   </tspan><tspan fill="#c8ffd9">JavaScript ⨯ TypeScript</tspan></text>
    <text x="230" y="168"><tspan fill="#00FF41" font-weight="bold">DE</tspan><tspan fill="#4d804d">:      </tspan><tspan fill="#c8ffd9">MERN Stack</tspan></text>
    <text x="230" y="191"><tspan fill="#00FF41" font-weight="bold">CPU</tspan><tspan fill="#4d804d">:     </tspan><tspan fill="#c8ffd9">Problem-Solving Core (100% util)</tspan></text>
    <text x="230" y="214"><tspan fill="#00FF41" font-weight="bold">Memory</tspan><tspan fill="#4d804d">:  </tspan><tspan fill="#c8ffd9">∞ browser tabs, mostly Stack Overflow</tspan></text>
