<svg width="100%" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines2" width="8" height="4" patternUnits="userSpaceOnUse">
      <rect width="8" height="1" fill="#000000" opacity="0.4"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="900" height="260" rx="16" fill="#050705"/>
  <rect x="4" y="4" width="892" height="252" rx="12" fill="#000000" stroke="#00FF41" stroke-width="1.2" opacity="0.95"/>

  <!-- left monogram block -->
  <rect x="26" y="26" width="180" height="180" rx="10" fill="#020a03" stroke="#1f6e33" stroke-width="1.5"/>
  <!-- corner reticle ticks -->
  <path d="M26 46 L26 26 L46 26" fill="none" stroke="#00FF41" stroke-width="2"/>
  <path d="M186 26 L206 26 L206 46" fill="none" stroke="#00FF41" stroke-width="2"/>
  <path d="M26 186 L26 206 L46 206" fill="none" stroke="#00FF41" stroke-width="2"/>
  <path d="M206 186 L206 206 L186 206" fill="none" stroke="#00FF41" stroke-width="2"/>
  <text x="116" y="140" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="82" font-weight="bold" fill="#00FF41" filter="url(#glow2)">AJ</text>

